<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Khách Hàng | Fashion Kids Admin</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Quicksand:wght@700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        :root {
            --primary-bg: #f4f7fe;
            --sidebar-color: #ffffff;
            --accent-color: #4318ff;
            --text-main: #2b3674;
            --text-secondary: #a3aed0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-main);
        }

        /* Sidebar cố định bên trái */
        .sidebar {
            width: 280px; height: 100vh; background: var(--sidebar-color);
            position: fixed; padding: 30px; z-index: 100;
            box-shadow: 10px 0 30px rgba(0,0,0,0.02);
        }

        .brand-logo {
            font-family: 'Quicksand', sans-serif; font-size: 1.5rem;
            color: var(--accent-color); margin-bottom: 50px;
            display: block; text-decoration: none;
        }

        .nav-link-custom {
            display: flex; align-items: center; padding: 15px 20px;
            border-radius: 15px; color: var(--text-secondary);
            text-decoration: none; font-weight: 600; transition: 0.3s; margin-bottom: 5px;
        }

        .nav-link-custom:hover, .nav-link-custom.active {
            background: var(--primary-bg); color: var(--accent-color);
        }

        /* Nội dung chính bên phải */
        .main-content { margin-left: 280px; padding: 40px; }

        .glass-card {
            background: white; border-radius: 25px; padding: 30px;
            border: none; box-shadow: 0 10px 20px rgba(0,0,0,0.02);
        }

        /* Avatar khách hàng */
        .user-avatar {
            width: 48px; height: 48px;
            background: linear-gradient(135deg, #4318ff 0%, #b09fff 100%);
            color: white; display: flex; align-items: center;
            justify-content: center; border-radius: 14px;
            font-weight: 700; font-size: 1.2rem;
            box-shadow: 0 4px 12px rgba(67, 24, 255, 0.2);
        }

        /* Nút hành động tròn */
        .btn-action-circle {
            width: 38px; height: 38px; border-radius: 10px;
            display: inline-flex; align-items: center; justify-content: center;
            transition: 0.3s; border: none; text-decoration: none;
        }

        .btn-view { background: #eef2ff; color: #4318ff; }
        .btn-view:hover { background: #4318ff; color: white; }

        .btn-edit { background: #fff9e6; color: #ffb800; }
        .btn-edit:hover { background: #ffb800; color: white; }

        .btn-delete { background: #fff5f5; color: #ee5d50; }
        .btn-delete:hover { background: #ee5d50; color: white; }

        .table thead th {
            border: none; color: var(--text-secondary);
            font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px;
            padding-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <a th:href="@{/admin/dashboard}" class="brand-logo fw-bold">FASHION <span style="color: #2b3674;">KIDS</span></a>
    <div class="nav flex-column">
        <a th:href="@{/admin/dashboard}" class="nav-link-custom">
            <i class="fa-solid fa-house-chimney me-3"></i> Dashboard
        </a>
        <a th:href="@{/admin/product}" class="nav-link-custom">
            <i class="fa-solid fa-boxes-stacked me-3"></i> Sản phẩm
        </a>
        <a th:href="@{/admin/orders}" class="nav-link-custom">
            <i class="fa-solid fa-cart-shopping me-3"></i> Đơn hàng
        </a>
        <a th:href="@{/admin/coupons}" class="nav-link-custom">
            <i class="fa-solid fa-ticket-simple me-3"></i> Mã giảm giá
        </a>
        <a th:href="@{/admin/customer}" class="nav-link-custom active">
            <i class="fa-solid fa-users me-3"></i> Khách hàng
        </a>
        <hr class="text-secondary opacity-25">
        <a th:href="@{/client/index}" class="nav-link-custom text-danger">
            <i class="fa-solid fa-right-from-bracket me-3"></i> Thoát Admin
        </a>
    </div>
</div>

<div class="main-content">
    <header class="d-flex justify-content-between align-items-center mb-5">
        <div>
            <h6 class="text-secondary fw-bold mb-1">Hệ thống người dùng</h6>
            <h3 class="fw-bold m-0">Quản lý khách hàng</h3>
        </div>
        <div class="d-flex gap-3">
            <a th:href="@{/admin/customer}" class="btn btn-white shadow-sm fw-600 rounded-pill px-4 bg-white">
                <i class="fa-solid fa-rotate me-2 text-primary"></i> Làm mới
            </a>
        </div>
    </header>

    <div class="glass-card animate__animated animate__fadeIn">
        <div class="table-responsive">
            <table class="table align-middle">
                <thead>
                <tr>
                    <th>Thông tin khách hàng</th>
                    <th>Số điện thoại</th>
                    <th class="text-center">Thao tác</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="u : ${users}">
                    <td>
                        <div class="d-flex align-items-center">
                            <div class="user-avatar me-3"
                                 th:text="${#strings.substring(u.name,0,1).toUpperCase()}">A</div>
                            <div>
                                <div class="fw-bold text-dark" th:text="${u.name}">Name</div>
                                <div class="text-muted small" th:text="${u.email}">Email</div>
                            </div>
                        </div>
                    </td>
                    <td>
                        <span class="badge bg-light text-dark fw-normal px-3 py-2 rounded-pill border">
                            <i class="fa-solid fa-phone fa-xs me-1 text-primary"></i>
                            <span th:text="${u.phone}">---</span>
                        </span>
                    </td>
                    <td class="text-center">
                        <div class="d-flex justify-content-center gap-2">
                            <a th:href="@{'/admin/customer/detail/' + ${u.id}}"
                               class="btn-action-circle btn-view" title="Xem chi tiết">
                                <i class="fa-solid fa-eye"></i>
                            </a>

                            <a th:href="@{'/admin/customer/edit/' + ${u.id}}"
                               class="btn-action-circle btn-edit" title="Chỉnh sửa">
                                <i class="fa-solid fa-pen"></i>
                            </a>

                            <a th:href="@{'/admin/customer/delete/' + ${u.id}}"
                               class="btn-action-circle btn-delete"
                               onclick="return confirm('Bạn chắc chắn muốn xóa tài khoản khách hàng này?')"
                               title="Xóa tài khoản">
                                <i class="fa-solid fa-trash"></i>
                            </a>
                        </div>
                    </td>
                </tr>

                <tr th:if="${#lists.isEmpty(users)}">
                    <td colspan="3" class="text-center py-5 text-muted">
                        <i class="fa-solid fa-users-slash d-block mb-3 fs-1 opacity-25"></i>
                        Chưa có khách hàng nào trong hệ thống.
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
