<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Sản Phẩm | Fashion Kids Admin</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Quicksand:wght@700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        :root {
            --primary-bg: #f4f7fe;
            --sidebar-color: #ffffff;
            --accent-color: #4318ff;
            --text-main: #2b3674;
            --text-secondary: #a3aed0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-main);
        }

        .sidebar {
            width: 280px; height: 100vh; background: var(--sidebar-color);
            position: fixed; padding: 30px; z-index: 100;
            box-shadow: 10px 0 30px rgba(0,0,0,0.02);
        }

        .brand-logo {
            font-family: 'Quicksand', sans-serif; font-size: 1.5rem;
            color: var(--accent-color); margin-bottom: 50px;
            display: block; text-decoration: none;
        }

        .nav-link-custom {
            display: flex; align-items: center; padding: 15px 20px;
            border-radius: 15px; color: var(--text-secondary);
            text-decoration: none; font-weight: 600; transition: 0.3s; margin-bottom: 5px;
        }

        .nav-link-custom:hover, .nav-link-custom.active {
            background: var(--primary-bg); color: var(--accent-color);
        }

        .main-content { margin-left: 280px; padding: 40px; }

        .glass-card {
            background: white; border-radius: 25px; padding: 30px;
            border: none; box-shadow: 0 10px 20px rgba(0,0,0,0.02);
            margin-bottom: 30px;
        }

        .form-control, .form-select {
            border-radius: 12px; border: 1px solid #e0e5f2;
            padding: 12px 15px; font-size: 0.95rem;
        }

        .form-control:focus {
            box-shadow: 0 0 0 4px rgba(67, 24, 255, 0.1);
            border-color: var(--accent-color);
        }

        .product-img {
            width: 70px; height: 70px; object-fit: cover;
            border-radius: 12px; border: 2px solid #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .btn-action-circle {
            width: 38px; height: 38px; border-radius: 10px;
            display: inline-flex; align-items: center; justify-content: center;
            transition: 0.3s; border: none; text-decoration: none;
        }

        .btn-edit { background: #fff9e6; color: #ffb800; }
        .btn-edit:hover { background: #ffb800; color: white; }

        .btn-delete { background: #fff5f5; color: #ee5d50; }
        .btn-delete:hover { background: #ee5d50; color: white; }

        .table thead th {
            border: none; color: var(--text-secondary);
            font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px;
            padding-bottom: 20px;
        }

        .badge-new {
            background: #e6faf5; color: #05cd99;
            font-size: 0.7rem; padding: 4px 8px; border-radius: 6px;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <a th:href="@{/admin/dashboard}" class="brand-logo fw-bold">FASHION <span style="color: #2b3674;">KIDS</span></a>
    <div class="nav flex-column">
        <a th:href="@{/admin/dashboard}" class="nav-link-custom"><i class="fa-solid fa-house-chimney me-3"></i> Dashboard</a>
        <a th:href="@{/admin/product}" class="nav-link-custom active"><i class="fa-solid fa-boxes-stacked me-3"></i> Sản phẩm</a>
        <a th:href="@{/admin/orders}" class="nav-link-custom"><i class="fa-solid fa-cart-shopping me-3"></i> Đơn hàng</a>
        <a th:href="@{/admin/coupons}" class="nav-link-custom"><i class="fa-solid fa-ticket-simple me-3"></i> Mã giảm giá</a>
        <a th:href="@{/admin/customer}" class="nav-link-custom"><i class="fa-solid fa-users me-3"></i> Khách hàng</a>
        <hr class="text-secondary opacity-25">
        <a th:href="@{/client/index}" class="nav-link-custom text-danger"><i class="fa-solid fa-right-from-bracket me-3"></i> Thoát Admin</a>
    </div>
</div>

<div class="main-content">
    <header class="d-flex justify-content-between align-items-center mb-5">
        <div>
            <h6 class="text-secondary fw-bold mb-1">Quản lý kho hàng</h6>
            <h3 class="fw-bold m-0">Sản phẩm & Danh mục</h3>
        </div>
    </header>

    <div class="row">
        <div class="col-lg-4">
            <div class="glass-card animate__animated animate__fadeInLeft">
                <h5 class="fw-bold mb-4">Thông tin sản phẩm</h5>
                <form th:action="@{/admin/product/save}" th:object="${product}" method="post" enctype="multipart/form-data">
                    <input type="hidden" th:field="*{id}">

                    <div class="mb-3">
                        <label class="small fw-bold text-secondary">Tên sản phẩm</label>
                        <input type="text" th:field="*{name}" class="form-control" placeholder="Nhập tên..." required>
                    </div>

                    <div class="mb-3">
                        <label class="small fw-bold text-secondary">Giá bán (₫)</label>
                        <input type="number" th:field="*{price}" class="form-control" placeholder="0" required>
                    </div>

                    <div class="mb-3">
                        <label class="small fw-bold text-secondary">Hình ảnh</label>
                        <input type="file" name="imageFile" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="small fw-bold text-secondary">Danh mục</label>
                        <select name="categoryId" class="form-select" required>
                            <option value="">-- Chọn danh mục --</option>
                            <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.name}"></option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="small fw-bold text-secondary">Số lượng đã bán</label>
                        <input type="number" th:field="*{sold}" class="form-control" placeholder="0">
                    </div>

                    <div class="mb-4">
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" th:field="*{isNew}" id="isNew">
                            <label class="form-check-label small fw-bold" for="isNew">Đánh dấu sản phẩm mới</label>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-2 fw-bold rounded-pill shadow-sm" style="background: var(--accent-color)">
                        <i class="fa-solid fa-floppy-disk me-2"></i> Lưu sản phẩm
                    </button>
                </form>

                <hr class="my-4 opacity-25">

                <h5 class="fw-bold mb-3">Thêm danh mục</h5>
                <form th:action="@{/admin/category/save}" method="post" class="d-flex gap-2">
                    <input type="text" name="name" class="form-control" placeholder="Tên danh mục..." required>
                    <button type="submit" class="btn btn-success rounded-pill px-3"><i class="fa-solid fa-plus"></i></button>
                </form>
            </div>
        </div>

        <div class="col-lg-8">
            <div class="glass-card animate__animated animate__fadeInRight">
                <div class="table-responsive">
                    <table class="table align-middle">
                        <thead>
                        <tr>
                            <th>Sản phẩm</th>
                            <th>Giá</th>
                            <th>Danh mục</th>
                            <th class="text-center">Thao tác</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="p : ${products}">
                            <td>
                                <div class="d-flex align-items-center">
                                    <img th:if="${p.image != null}" th:src="@{'/uploads/' + ${p.image}}" class="product-img me-3">
                                    <img th:unless="${p.image != null}" src="https://via.placeholder.com/70" class="product-img me-3">
                                    <div>
                                        <div class="fw-bold" th:text="${p.name}"></div>
                                        <span th:if="${p.isNew}" class="badge-new fw-bold">NEW</span>
                                    </div>
                                </div>
                            </td>
                            <td>
                                <span class="fw-bold text-primary" th:text="${#numbers.formatInteger(p.price, 1, 'POINT')} + '₫'"></span>
                            </td>
                            <td>
                                <span class="badge bg-light text-secondary border px-3 py-2 rounded-pill fw-normal"
                                      th:text="${p.category != null ? p.category.name : 'Chưa phân loại'}"></span>
                            </td>
                            <td class="text-center">
                                <div class="d-flex justify-content-center gap-2">
                                    <a th:href="@{'/admin/product/edit/' + ${p.id}}" class="btn-action-circle btn-edit" title="Chỉnh sửa">
                                        <i class="fa-solid fa-pen"></i>
                                    </a>
                                    <a th:href="@{'/admin/product/delete/' + ${p.id}}" class="btn-action-circle btn-delete"
                                       onclick="return confirm('Xóa sản phẩm này?')">
                                        <i class="fa-solid fa-trash"></i>
                                    </a>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(products)}">
                            <td colspan="4" class="text-center py-5 text-muted">Chưa có sản phẩm nào 📦</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
