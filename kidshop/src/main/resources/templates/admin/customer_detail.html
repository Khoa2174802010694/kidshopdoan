<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết khách hàng</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background: #f8f9fa; }
        .card { border-radius: 15px; }
    </style>
</head>
<body>

<div class="container mt-4">

    <!-- USER INFO -->
    <div class="card p-4 mb-4 shadow-sm">
        <div class="d-flex justify-content-between align-items-center">

            <div>
                <h4 class="mb-1" th:text="${user.name}">User</h4>
                <p class="mb-1">📧 <span th:text="${user.email}"></span></p>
                <p class="mb-0">📱 <span th:text="${user.phone}"></span></p>
            </div>

            <div class="d-flex gap-2">
                <!-- EDIT -->
                <a th:href="@{'/admin/customer/edit/' + ${user.id}}"
                   class="btn btn-warning">
                    ✏️ Chỉnh sửa
                </a>

                <!-- BACK -->
                <a th:href="@{/admin/customer}" class="btn btn-secondary">
                    ← Quay lại
                </a>
            </div>

        </div>
    </div>

    <!-- ORDERS -->
    <div class="card p-4 shadow-sm">
        <h5 class="mb-3">Đơn hàng</h5>

        <table class="table align-middle">
            <thead>
            <tr>
                <th>ID</th>
                <th>Ngày</th>
                <th>Tổng</th>
                <th>Trạng thái</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="o : ${orders}">
                <td th:text="${o.id}"></td>
                <td th:text="${o.date}"></td>
                <td th:text="${o.total}"></td>
                <td>
                    <span class="badge bg-success" th:if="${o.status == 'APPROVED'}">APPROVED</span>
                    <span class="badge bg-warning text-dark" th:if="${o.status == 'PENDING'}">PENDING</span>
                    <span class="badge bg-danger" th:if="${o.status == 'CANCELLED'}">CANCELLED</span>
                </td>
            </tr>

            <tr th:if="${#lists.isEmpty(orders)}">
                <td colspan="4" class="text-center py-4">
                    Không có đơn hàng nào
                </td>
            </tr>

            </tbody>
        </table>
    </div>

</div>

</body>
</html>
