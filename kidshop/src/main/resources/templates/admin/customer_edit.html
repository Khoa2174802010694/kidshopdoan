<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chỉnh sửa khách hàng</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">

    <h3 class="mb-4">Chỉnh sửa khách hàng</h3>

    <form th:action="@{/admin/customer/update}" method="post">

        <input type="hidden" name="id" th:value="${user.id}"/>

        <div class="mb-3">
            <label>Tên</label>
            <input type="text" name="name" class="form-control" th:value="${user.name}">
        </div>

        <div class="mb-3">
            <label>Email</label>
            <input type="text" name="email" class="form-control" th:value="${user.email}">
        </div>

        <div class="mb-3">
            <label>Số điện thoại</label>
            <input type="text" name="phone" class="form-control" th:value="${user.phone}">
        </div>

        <div class="mb-3">
            <label>Username</label>
            <input type="text" name="username" class="form-control" th:value="${user.username}">
        </div>

        <div class="mb-3">
            <label>Mật khẩu (để trống nếu không đổi)</label>
            <input type="password" name="password" class="form-control">
        </div>

        <div class="mb-3">
            <label>Role</label>
            <select name="role" class="form-control">
                <option value="USER" th:selected="${user.role == 'USER'}">USER</option>
                <option value="ADMIN" th:selected="${user.role == 'ADMIN'}">ADMIN</option>
            </select>
        </div>

        <button class="btn btn-primary">Cập nhật</button>
        <a th:href="@{/admin/customer}" class="btn btn-secondary">Hủy</a>

    </form>

</div>

</body>
</html>
